<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Início</a>
            <a href="contato.html">Contato</a>
            <a href="login.html">Login</a>
        </nav>
        <img src="assets/imgLogo.png" alt="Logo da HortWestfal" width="100px" height="100px">
        <h1>HortWestfal</h1>
        <h2>Insumos para o Agronegócio</h2>

    </header>
    <main>
        <section>
            <h2>Crie Sua Conta</h2>
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome"  minlength="3">  <br><br>


                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required> <br><br>


                <label for="senha">Crie uma senha:</label>
                <input type="password" id="inSenha" name="senha" minlength="5" oninvalid="this.setCustomValidity('crie uma de senha de no minimo 5 caracteres.')"             
                oninput="this.setCustomValidity('')" required> <br><br>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" required oninvalid="this.setCustomValidity('Digite conforme o modelo: xxx.xxx.xxx-xx')" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}"> <br><br>

                <input type="submit">














            </form>





        </section>
    </main>











</body>

</html>

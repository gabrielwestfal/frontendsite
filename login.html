<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="criar-conta.css">
    <title>Login HortWestfal</title>
</head>

<body>
    <header>
        <img src="assets/imgLogo.png" alt="Logo da HortWestfal" width="100px" height="100px">

        <nav>
            <a href="index.html">Início/</a>
            <a href="criar-conta.html">Criar conta/</a>
            <a href="contato.html">Contato/</a>
        </nav>
        <h1>HortWestfal</h1>
        <h2>Insumos para o Agronegócio</h2>

    </header>
    <main>
        <section>
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" minlength="3"> <br><br>


                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required> <br><br>


                <label for="senha">Digite sua senha:</label>
                <input type="password" id="inSenha" name="senha" minlength="5"
                    oninvalid="this.setCustomValidity('crie uma de senha de no minimo 5 caracteres.')"
                    oninput="this.setCustomValidity('')" required> <br><br>

                <input type="submit">


            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 HortWestfal. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
